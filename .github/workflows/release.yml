name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: kasmctl-linux-amd64
            deb: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: kasmctl-linux-arm64
            cross: true
            deb: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: kasmctl-linux-amd64-musl
            musl: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: kasmctl-linux-arm64-musl
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: kasmctl-darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: kasmctl-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary
        if: ${{ !matrix.deb }}
        run: |
          cp target/${{ matrix.target }}/release/kasmctl kasmctl
          tar czf ${{ matrix.artifact }}.tar.gz kasmctl

      - name: Upload artifact
        if: ${{ !matrix.deb }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Generate shell completions
        if: matrix.deb
        run: |
          mkdir -p completions
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo build --release
            COMP_BIN=target/release/kasmctl
          else
            COMP_BIN=target/${{ matrix.target }}/release/kasmctl
          fi
          $COMP_BIN completion bash > completions/kasmctl.bash
          $COMP_BIN completion zsh > completions/_kasmctl
          $COMP_BIN completion fish > completions/kasmctl.fish

      - name: Install cargo-deb
        if: matrix.deb
        run: cargo install cargo-deb --locked

      - name: Build deb package
        if: matrix.deb
        run: cargo deb --no-build --target=${{ matrix.target }}

      - name: Upload deb artifact
        if: matrix.deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-deb
          path: target/${{ matrix.target }}/debian/*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.deb > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/checksums-sha256.txt
